    <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#fffdf7"/>
      <stop offset="100%" stop-color="#f6eddc"/>
    </radialGradient>

    <radialGradient id="rambutanRed" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ff8a7a"/>
      <stop offset="55%" stop-color="#e53935"/>
      <stop offset="100%" stop-color="#a31515"/>
    </radialGradient>

    <radialGradient id="rambutanYellow" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#fff2a8"/>
      <stop offset="55%" stop-color="#f4c542"/>
      <stop offset="100%" stop-color="#c79112"/>
    </radialGradient>

    <radialGradient id="rambutanGreen" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#d8ffc8"/>
      <stop offset="55%" stop-color="#7bc96f"/>

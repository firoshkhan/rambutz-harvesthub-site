    <circle cx="230" cy="95" r="2" fill="#ffffff"/>
    <circle cx="1030" cy="140" r="3" fill="#ffffff"/>
    <circle cx="980" cy="100" r="2" fill="#ffffff"/>
    <circle cx="1080" cy="210" r="2" fill="#ffffff"/>

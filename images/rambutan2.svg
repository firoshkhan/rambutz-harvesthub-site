  <rect width="1200" height="800" fill="url(#bgGrad)"/>

  <ellipse cx="620" cy="690" rx="320" ry="72" fill="#000000" opacity="0.08"/>

  <path d="M 370 285 C 465 220, 565 215, 650 252" fill="none" stroke="url(#stemGrad)" stroke-width="12" stroke-linecap="round"/>
  <path d="M 640 252 C 760 215, 880 245, 950 320" fill="none" stroke="url(#stemGrad)" stroke-width="10" stroke-linecap="round"/>

  <path d="M 520 212 C 470 170, 405 176, 365 225 C 430 252, 494 248, 520 212 Z" fill="url(#leafGrad)" opacity="0.95"/>
  <path d="M 808 248 C 872 220, 936 245, 970 298 C 904 306, 845 292, 808 248 Z" fill="url(#leafGrad)" opacity="0.95"/>
  <path d="M 690 210 C 735 160, 806 150, 868 186 C 808 226, 742 232, 690 210 Z" fill="url(#leafGrad)" opacity="0.9"/>

  <g transform="translate(420 430) rotate(-10)" filter="url(#shadow)">

      <ellipse cx="10" cy="8" rx="26" ry="40" fill="url(#seedGrad)" transform="rotate(18 10 8)"/>
      <ellipse cx="-18" cy="-18" rx="22" ry="14" fill="#ffffff" opacity="0.25"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-label="Real rambutan fruit image">
  <defs>
    <linearGradient id="overlay" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
    </linearGradient>
  </defs>
  <rect width="800" height="520" rx="40" fill="url(#overlay)"/>
  <image
    href="https://upload.wikimedia.org/wikipedia/commons/a/ae/Rambutan_Fruit.jpg"
    x="0"
    y="0"
    width="800"
    height="520"
    preserveAspectRatio="xMidYMid slice"
  />
  <rect width="800" height="520" rx="40" fill="rgba(5, 18, 10, 0.25)"/>
  <text x="104" y="458" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700">Rambutan • Fresh • Premium</text>
</svg>
